<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0510;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#110a1a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#b366ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#5b21b6;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="centerGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#b366ff;stop-opacity:0.08" />
      <stop offset="100%" style="stop-color:#0a0510;stop-opacity:0" />
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>
  
  <!-- Subtle grid pattern -->
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#b366ff" stroke-width="0.3" opacity="0.08"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#grid)"/>
  
  <!-- Center glow -->
  <ellipse cx="600" cy="315" rx="500" ry="300" fill="url(#centerGlow)"/>
  
  <!-- Border accent -->
  <rect x="3" y="3" width="1194" height="624" rx="8" fill="none" stroke="url(#accentGrad)" stroke-width="2" opacity="0.4"/>

  <!-- Font Awesome dragon icon (CC BY 4.0) -->
  <g transform="translate(120, 195) scale(0.38)" filter="url(#glow)">
    <path d="M352 124.5l-51.9-13c-6.5-1.6-11.3-7.1-12-13.8s2.8-13.1 8.7-16.1l40.8-20.4L294.4 28.8c-5.5-4.1-7.8-11.3-5.6-17.9S297.1 0 304 0L416 0l32 0 16 0c30.2 0 58.7 14.2 76.8 38.4l57.6 76.8c6.2 8.3 9.6 18.4 9.6 28.8c0 26.5-21.5 48-48 48l-21.5 0c-17 0-33.3-6.7-45.3-18.7L480 160l-32 0 0 21.5c0 24.8 12.8 47.9 33.8 61.1l106.6 66.6c32.1 20.1 51.6 55.2 51.6 93.1C640 462.9 590.9 512 530.2 512L496 512l-64 0L32.3 512c-3.3 0-6.6-.4-9.6-1.4C13.5 507.8 6 501 2.4 492.1C1 488.7 .2 485.2 0 481.4c-.2-3.7 .3-7.3 1.3-10.7c2.8-9.2 9.6-16.7 18.6-20.4c3-1.2 6.2-2 9.5-2.2L433.3 412c8.3-.7 14.7-7.7 14.7-16.1c0-4.3-1.7-8.4-4.7-11.4l-44.4-44.4c-30-30-46.9-70.7-46.9-113.1l0-45.5 0-57zM512 72.3c0-.1 0-.2 0-.3s0-.2 0-.3l0 .6zm-1.3 7.4L464.3 68.1c-.2 1.3-.3 2.6-.3 3.9c0 13.3 10.7 24 24 24c10.6 0 19.5-6.8 22.7-16.3zM130.9 116.5c16.3-14.5 40.4-16.2 58.5-4.1l130.6 87 0 27.5c0 32.8 8.4 64.8 24 93l-232 0c-6.7 0-12.7-4.2-15-10.4s-.5-13.3 4.6-17.7L171 232.3 18.4 255.8c-7 1.1-13.9-2.6-16.9-9s-1.5-14.1 3.8-18.8L130.9 116.5z" fill="url(#accentGrad)"/>
  </g>

  <!-- Company Name -->
  <text x="480" y="250" font-family="Arial, Helvetica, sans-serif" font-weight="800" font-size="72" fill="#e4dfe9" letter-spacing="4">
    NOCTURN<tspan fill="#b366ff">3</tspan>
  </text>
  
  <!-- Full Company Name -->
  <text x="480" y="310" font-family="Arial, Helvetica, sans-serif" font-weight="400" font-size="26" fill="#9088a8" letter-spacing="2">
    INFORMATION SECURITY INC.
  </text>

  <!-- Divider line -->
  <line x1="480" y1="340" x2="780" y2="340" stroke="url(#accentGrad)" stroke-width="2" opacity="0.6"/>

  <!-- Tagline -->
  <text x="480" y="380" font-family="Arial, Helvetica, sans-serif" font-weight="300" font-size="22" fill="#e4dfe9">
    Cybersecurity Consulting &amp; Training
  </text>
  
  <!-- Services tags -->
  <text x="480" y="420" font-family="Arial, Helvetica, sans-serif" font-weight="400" font-size="16" fill="#9088a8">
    Security Consulting  ·  VAPT  ·  AI Security  ·  Compliance  ·  Training
  </text>

  <!-- Location -->
  <text x="480" y="470" font-family="Arial, Helvetica, sans-serif" font-weight="400" font-size="16" fill="#b366ff">
    Burlington, Ontario  ·  nocturn3.com
  </text>

  <!-- Bottom accent bar -->
  <rect x="0" y="620" width="1200" height="10" fill="url(#accentGrad)" opacity="0.8"/>
</svg>
