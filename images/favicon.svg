<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#b366ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#5b21b6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="wingGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c084fc;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:0.4" />
    </linearGradient>
    <radialGradient id="eyeGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#e9d5ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#b366ff;stop-opacity:0.8" />
    </radialGradient>
  </defs>
  <!-- Background -->
  <rect width="64" height="64" rx="14" fill="#0a0510"/>
  <!-- Left wing -->
  <path d="M8 18 Q6 12 10 8 Q14 14 18 18 Q22 22 26 28 L22 30 Q16 26 12 22 Z" 
        fill="url(#wingGrad)" opacity="0.9"/>
  <!-- Right wing -->
  <path d="M56 18 Q58 12 54 8 Q50 14 46 18 Q42 22 38 28 L42 30 Q48 26 52 22 Z" 
        fill="url(#wingGrad)" opacity="0.9"/>
  <!-- Dragon body/head -->
  <path d="M32 14 Q26 16 24 22 Q22 28 24 32 Q26 36 28 38 L32 42 L36 38 Q38 36 40 32 Q42 28 40 22 Q38 16 32 14 Z" 
        fill="url(#grad)"/>
  <!-- Dragon horns -->
  <path d="M26 18 L22 10 L28 16" fill="url(#grad)"/>
  <path d="M38 18 L42 10 L36 16" fill="url(#grad)"/>
  <!-- Dragon eyes -->
  <circle cx="28" cy="22" r="2.5" fill="url(#eyeGlow)"/>
  <circle cx="36" cy="22" r="2.5" fill="url(#eyeGlow)"/>
  <circle cx="28.5" cy="22" r="1" fill="#0a0510"/>
  <circle cx="36.5" cy="22" r="1" fill="#0a0510"/>
  <!-- Dragon snout -->
  <path d="M30 28 L32 32 L34 28" fill="none" stroke="#c084fc" stroke-width="1" stroke-linecap="round"/>
  <!-- Nostrils glow -->
  <circle cx="30" cy="28" r="0.8" fill="#c084fc" opacity="0.6"/>
  <circle cx="34" cy="28" r="0.8" fill="#c084fc" opacity="0.6"/>
  <!-- Tail -->
  <path d="M32 42 Q30 46 28 48 Q24 52 20 54 Q18 55 16 54 Q18 56 22 55 Q28 53 30 50 Q32 48 34 50 Q36 53 42 55 Q46 56 48 54 Q46 55 44 54 Q40 52 36 48 Q34 46 32 42 Z" 
        fill="url(#grad)" opacity="0.85"/>
  <!-- Wing membrane lines -->
  <line x1="10" y1="10" x2="22" y2="28" stroke="#b366ff" stroke-width="0.5" opacity="0.3"/>
  <line x1="14" y1="12" x2="24" y2="28" stroke="#b366ff" stroke-width="0.5" opacity="0.3"/>
  <line x1="54" y1="10" x2="42" y2="28" stroke="#b366ff" stroke-width="0.5" opacity="0.3"/>
  <line x1="50" y1="12" x2="40" y2="28" stroke="#b366ff" stroke-width="0.5" opacity="0.3"/>
</svg>
